<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReviewGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <div class="header__logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
            <rect width="28" height="28" rx="8" fill="url(#logoGrad)"/>
            <path d="M8 14.5L12 18.5L20 10.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1 class="header__title">ReviewGuard</h1>
          <p class="header__subtitle">AI-Powered Review Detector</p>
        </div>
      </div>
      <div class="header__status" id="statusDot">
        <span class="status-dot status-dot--disconnected"></span>
        <span class="status-label" id="statusLabel">Checking…</span>
      </div>
    </header>

    <!-- Stats Cards -->
    <div class="stats" id="statsSection" style="display: none;">
      <div class="stat-card stat-card--scanned">
        <div class="stat-card__value" id="statScanned">0</div>
        <div class="stat-card__label">Scanned</div>
      </div>
      <div class="stat-card stat-card--genuine">
        <div class="stat-card__value" id="statGenuine">0</div>
        <div class="stat-card__label">Genuine</div>
      </div>
      <div class="stat-card stat-card--fake">
        <div class="stat-card__value" id="statFake">0</div>
        <div class="stat-card__label">Fake</div>
      </div>
      <div class="stat-card stat-card--uncertain">
        <div class="stat-card__value" id="statUncertain">0</div>
        <div class="stat-card__label">Uncertain</div>
      </div>
    </div>

    <!-- Score Bar -->
    <div class="score-bar-wrap" id="scoreBarWrap" style="display: none;">
      <div class="score-bar__header">
        <span>Trust Score</span>
        <span class="score-bar__pct" id="trustPct">—</span>
      </div>
      <div class="score-bar">
        <div class="score-bar__fill" id="trustFill" style="width: 0%;"></div>
      </div>
    </div>

    <!-- Action Button -->
    <button class="btn-scan" id="btnScan" disabled>
      <svg class="btn-scan__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span id="btnScanLabel">Scan Reviews</span>
    </button>

    <!-- Jump to Fake Navigation -->
    <div class="jump-nav" id="jumpNav" style="display: none;">
      <div class="jump-nav__header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>Navigate Fake Reviews</span>
      </div>
      <div class="jump-nav__controls">
        <button class="jump-nav__btn" id="btnPrev" title="Previous fake review">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="jump-nav__counter" id="jumpCounter">0 / 0</span>
        <button class="jump-nav__btn" id="btnNext" title="Next fake review">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Feedback / errors -->
    <div class="message" id="message" style="display: none;"></div>

    <!-- Settings Accordion -->
    <details class="settings">
      <summary class="settings__toggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0
            010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0
            00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4
            0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0
            00-1.82.33l-.06.06a2 2 0 01-2.83
            0 2 2 0 010-2.83l.06-.06A1.65 1.65 0
            004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0
            010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0
            00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0
            012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65
            1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65
            0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2
            0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65
            0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0
            010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        Settings
      </summary>
      <div class="settings__body">
        <label class="settings__label" for="apiUrlInput">Backend URL</label>
        <input
          class="settings__input"
          id="apiUrlInput"
          type="url"
          placeholder="http://localhost:8000"
          spellcheck="false"
        />
        <label class="settings__label" for="nvidiaKeyInput" style="margin-top: 10px;">NVIDIA API Key</label>
        <input
          class="settings__input"
          id="nvidiaKeyInput"
          type="password"
          placeholder="nvapi-..."
          spellcheck="false"
        />
        <button class="btn-save" id="btnSave" style="margin-top: 16px;">Save Settings</button>
        <div class="settings__hint">
          Model accuracy: <strong id="modelAccuracy">—</strong>
        </div>
      </div>
    </details>

    <!-- Footer -->
    <footer class="footer">
      ReviewGuard v1.0 · ML-powered fake review detection
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
